<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    
    <!-- CDNs for React, Babel (to run JSX in browser), Tailwind, and Lucide Icons -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
        
        .glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Game Data
        const gamesData = [
            {
                "id": "basket-random",
                "title": "Basket Random",
                "thumbnail": "https://picsum.photos/seed/basket/400/300",
                "url": "https://www.twoplayergames.org/gameframe/basket-random"
            }
        ];

        // Icon Component Helper
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [games, setGames] = useState(gamesData);
            const [selectedGame, setSelectedGame] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isFullScreen, setIsFullScreen] = useState(false);

            const filteredGames = games.filter(game =>
                game.title.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const toggleFullScreen = () => {
                setIsFullScreen(!isFullScreen);
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-emerald-500/30">
                    {/* Navigation */}
                    <nav className="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between gap-4">
                            <div 
                                className="flex items-center gap-2 cursor-pointer group"
                                onClick={() => setSelectedGame(null)}
                            >
                                <div className="p-2 bg-emerald-500 rounded-lg group-hover:scale-110 transition-transform">
                                    <Icon name="gamepad-2" className="w-6 h-6 text-black" />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight hidden sm:block">
                                    UNBLOCKED<span className="text-emerald-500">HUB</span>
                                </h1>
                            </div>

                            <div className="flex-1 max-w-md relative">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-white/40">
                                    <Icon name="search" className="w-4 h-4" />
                                </div>
                                <input
                                    type="text"
                                    placeholder="Search games..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 transition-all text-sm"
                                />
                            </div>

                            <div className="flex items-center gap-4">
                                <button className="text-sm font-medium text-white/60 hover:text-white transition-colors">New</button>
                                <button className="text-sm font-medium text-white/60 hover:text-white transition-colors">Popular</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 py-8">
                        <AnimatePresence mode="wait">
                            {!selectedGame ? (
                                <motion.div
                                    key="grid"
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                >
                                    {filteredGames.length > 0 ? (
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                            {filteredGames.map((game) => (
                                                <motion.div
                                                    key={game.id}
                                                    onClick={() => setSelectedGame(game)}
                                                    className="group relative bg-white/5 rounded-2xl overflow-hidden border border-white/5 hover:border-emerald-500/30 transition-all cursor-pointer"
                                                    whileHover={{ y: -4 }}
                                                >
                                                    <div className="aspect-[4/3] overflow-hidden">
                                                        <img
                                                            src={game.thumbnail}
                                                            alt={game.title}
                                                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                                            referrerPolicy="no-referrer"
                                                        />
                                                    </div>
                                                    <div className="p-4 bg-gradient-to-t from-black/80 to-transparent">
                                                        <h3 className="font-semibold text-sm tracking-wide">{game.title}</h3>
                                                        <p className="text-xs text-white/40 mt-1">Play Now</p>
                                                    </div>
                                                </motion.div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center py-20 text-center">
                                            <div className="p-6 bg-white/5 rounded-full mb-4">
                                                <Icon name="gamepad-2" className="w-12 h-12 text-white/20" />
                                            </div>
                                            <h3 className="text-xl font-semibold text-white/60">No games found</h3>
                                            <p className="text-white/40 mt-2 max-w-xs">
                                                {searchQuery ? `We couldn't find any games matching "${searchQuery}"` : "The game library is currently empty."}
                                            </p>
                                        </div>
                                    )}
                                </motion.div>
                            ) : (
                                <motion.div
                                    key="player"
                                    initial={{ opacity: 0, scale: 0.95 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.95 }}
                                    className="flex flex-col gap-4"
                                >
                                    <div className="flex items-center justify-between">
                                        <button
                                            onClick={() => setSelectedGame(null)}
                                            className="flex items-center gap-2 text-white/60 hover:text-white transition-colors group"
                                        >
                                            <Icon name="arrow-left" className="w-5 h-5 group-hover:-translate-x-1 transition-transform" />
                                            <span>Back to Games</span>
                                        </button>
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-xl font-bold">{selectedGame.title}</h2>
                                            <button
                                                onClick={toggleFullScreen}
                                                className="p-2 bg-white/5 rounded-lg hover:bg-white/10 transition-colors"
                                            >
                                                <Icon name="maximize-2" className="w-5 h-5" />
                                            </button>
                                        </div>
                                    </div>

                                    <div className={`relative bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl transition-all duration-500 ${isFullScreen ? 'fixed inset-0 z-[100] rounded-none' : 'aspect-video w-full'}`}>
                                        {isFullScreen && (
                                            <button
                                                onClick={toggleFullScreen}
                                                className="absolute top-6 right-6 z-[101] p-3 bg-black/50 backdrop-blur-md rounded-full hover:bg-black transition-colors"
                                            >
                                                <Icon name="x" className="w-6 h-6" />
                                            </button>
                                        )}
                                        <iframe
                                            src={selectedGame.url}
                                            className="w-full h-full border-none"
                                            title={selectedGame.title}
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                            allowFullScreen
                                        />
                                    </div>

                                    {!isFullScreen && (
                                        <div className="mt-4 p-6 bg-white/5 rounded-3xl border border-white/5">
                                            <h3 className="text-lg font-semibold mb-2">About {selectedGame.title}</h3>
                                            <p className="text-white/60 text-sm leading-relaxed">
                                                Enjoy {selectedGame.title} unblocked on our platform. High performance, no lag, and completely free to play.
                                            </p>
                                        </div>
                                    )}
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="mt-20 border-t border-white/5 py-12 px-6">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-2 opacity-50">
                                <Icon name="gamepad-2" className="w-5 h-5" />
                                <span className="text-sm font-bold tracking-tighter">UNBLOCKED HUB</span>
                            </div>
                            <div className="flex gap-8 text-sm text-white/40">
                                <a href="#" className="hover:text-emerald-500 transition-colors">Terms</a>
                                <a href="#" className="hover:text-emerald-500 transition-colors">Privacy</a>
                                <a href="#" className="hover:text-emerald-500 transition-colors">Contact</a>
                            </div>
                            <p className="text-xs text-white/20">© 2024 Unblocked Games Hub. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
